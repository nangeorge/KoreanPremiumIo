name: Save BTC Premium Daily

on:
  schedule:
    - cron: "0 15 * * *" # 매일 00:00 KST (UTC+9 = UTC 15:00)
  workflow_dispatch:       # 수동 실행 허용

jobs:
  save-premium:
    runs-on: ubuntu-latest
    steps:
      - name: Save today's BTC Kimchi Premium
        run: |
          curl -f -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            "${{ secrets.NEXT_PUBLIC_BASE_URL }}/api/btcpremium/save"
          echo "✅ BTC premium saved for $(date +%Y-%m-%d)"
